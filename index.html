<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>假日果園時薪計帳</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    rel="stylesheet" />
  <!-- Google API Component -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
</head>

<body>
  <header class="app-header">
    <div class="header-title">
      <span class="material-symbols-outlined icon">nature_people</span>
      <h1>果園時薪計帳</h1>
    </div>
    <div class="user-controls">
      <div id="userInfo" style="display:none; align-items:center; gap:8px;">
        <span id="userEmailText" class="text-sm text-muted"></span>
        <button id="logoutBtn" class="btn btn-icon" title="登出並清除存取權"><span
            class="material-symbols-outlined">logout</span></button>
      </div>
    </div>
  </header>

  <main class="app-container">
    <!-- Initial Loading / Login State -->
    <div id="authSection" class="glass card text-center">
      <h2>請先登入與授權</h2>
      <p>點擊下方按鈕登入含有試算表權限的 Google 帳號。</p>
      <div style="margin-top: 1rem;">
        <button id="authBtn" class="btn btn-outline" style="display: none;">Google 登入</button>
      </div>
    </div>

    <!-- Main Workspace (Hidden until logged in) -->
    <div id="workspace" style="display: none;">

      <!-- User Form: Add Record -->
      <section class="form-section card glass" id="formSection">
        <div class="form-header">
          <h2>新增工時紀錄</h2>
          <span class="role-badge" id="currentRoleBadge">使用者模式</span>
        </div>
        <form id="recordForm">
          <input type="hidden" id="recordId">
          <div class="form-group row">
            <div class="input-wrap">
              <label for="workDate">日期 *</label>
              <input type="date" id="workDate" required>
            </div>
            <div class="input-wrap" id="workerNameWrap">
              <label for="workerName">工人姓名 *</label>
              <!-- Populated from Settings -->
              <input type="text" id="workerName" list="workerList" required>
              <datalist id="workerList"></datalist>
            </div>
          </div>

          <div class="form-group row">
            <div class="input-wrap">
              <label for="mainCategory">主類別 *</label>
              <select id="mainCategory" required>
                <!-- Populated from settings -->
                <option value="工人" selected>工人</option>
              </select>
            </div>
            <div class="input-wrap">
              <label for="subCategory">工作項目 *</label>
              <select id="subCategory" required>
                <!-- Populated from settings -->
              </select>
            </div>
          </div>

          <div class="form-group row">
            <div class="input-wrap">
              <label for="workHours" id="hoursLabel">時數/天數/數量 *</label>
              <input type="number" id="workHours" step="0.5" min="0" required>
            </div>
            <div class="input-wrap">
              <label for="hourlyRate" id="rateLabel">時薪/日薪/單價 *</label>
              <input type="number" id="hourlyRate" step="10" min="0" required>
            </div>
          </div>

          <div class="form-group row" style="align-items: center;">
            <div class="input-wrap" style="flex: 1;">
              <label for="notes">備註</label>
              <input type="text" id="notes">
            </div>
            <div class="input-wrap checkbox-wrap" id="lunchCheckWrap" style="flex: 0 0 auto; margin-top: 1.5rem; display: flex; align-items: center; gap: 8px;">
              <input type="checkbox" id="includeLunch" style="width: auto; height: 18px; margin: 0;">
              <label for="includeLunch" style="margin: 0; font-weight: normal; cursor: pointer;">包含午餐 (+$100)</label>
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-secondary" id="resetFormBtn">清除</button>
            <button type="submit" class="btn btn-primary" id="saveBtn">儲存紀錄</button>
          </div>
        </form>
      </section>

      <!-- Copy to Line Utility -->
      <section class="copy-section card glass">
        <h3>複製小幫手 <span class="material-symbols-outlined text-sm">content_copy</span></h3>
        <div class="input-wrap" style="margin-bottom: 1rem;">
          <label>指定日期產生明細</label>
          <div style="display: flex; gap: 0.5rem;">
            <input type="date" id="copyDate">
            <button class="btn btn-primary" id="copyToLineBtn">產生並複製</button>
          </div>
        </div>
        <textarea id="copyPreview" rows="4" readonly hidden
          style="width: 100%; border-radius: 8px; padding: 8px; font-size: 0.9em;"></textarea>
      </section>

      <!-- Admin Settings Section (Hidden by default) -->
      <section class="admin-section card glass" id="adminSection" style="display: none;">
        <h2><span class="material-symbols-outlined text-warning">settings</span> 管理員設定 (同步至 Google Sheets)</h2>
        <div class="settings-grid">
          <div class="settings-box">
            <label>新增常用工人</label>
            <div style="display:flex; gap:0.5rem;">
              <input type="text" id="newWorkerInput">
              <button class="btn btn-secondary" onclick="addSetting('Worker', 'newWorkerInput')">新增</button>
            </div>
            <div id="workerListAdmin" class="mt-1" style="font-size: 0.9em; max-height: 100px; overflow-y: auto;"></div>
          </div>
          <div class="settings-box">
            <label>新主類別</label>
            <div style="display:flex; gap:0.5rem;">
              <input type="text" id="newMainCatInput">
              <button class="btn btn-secondary" onclick="addSetting('MainCategory', 'newMainCatInput')">新增</button>
            </div>
            <div id="mainCatListAdmin" class="mt-1" style="font-size: 0.9em; max-height: 100px; overflow-y: auto;"></div>
          </div>
          <div class="settings-box">
            <label>新增工作項目(次類別)</label>
            <div style="display:flex; gap:0.5rem;">
              <input type="text" id="newSubCatInput">
              <button class="btn btn-secondary" onclick="addSetting('SubCategory', 'newSubCatInput')">新增</button>
            </div>
            <div id="subCatListAdmin" class="mt-1" style="font-size: 0.9em; max-height: 100px; overflow-y: auto;"></div>
          </div>
        </div>
      </section>

      <!-- Records View -->
      <section class="records-section">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <h2 style="margin:0;">近期紀錄</h2>
          <button class="btn btn-icon" id="refreshBtn" title="重新載入資料"><span
              class="material-symbols-outlined">refresh</span></button>
        </div>
        <div id="recordsList" class="records-list mt-2">
          <!-- Populated by JS -->
        </div>
      </section>

    </div>
  </main>

  <!-- Loading overlay -->
  <div id="loader" class="loader-overlay" style="display:none;">
    <div class="spinner"></div>
    <div style="color:white; margin-top:1rem;" id="loaderMsg">處理中...</div>
  </div>

  <script src="app.js"></script>
</body>

</html>
